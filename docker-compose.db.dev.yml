services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-postgres-dev
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5433:5432"
    volumes:
      - helpdesk_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  helpdesk_postgres_dev_data:
    name: helpdesk_postgres_dev_data
