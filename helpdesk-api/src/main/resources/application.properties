spring.application.name=Helpdesk
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/helpdesk}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:helpdesk}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:helpdesk}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.attachments.storage-dir=${APP_ATTACHMENTS_STORAGE_DIR:uploads/attachments}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://macieserafin.pl}
# Development/tests only. The browser app uses session cookies, not Basic Auth.
app.security.basic-auth-enabled=${APP_SECURITY_BASIC_AUTH_ENABLED:false}
app.demo.seed.enabled=${APP_DEMO_SEED_ENABLED:true}
app.demo.seed.accounts-enabled=${APP_DEMO_SEED_ACCOUNTS_ENABLED:true}
app.demo.seed.categories-enabled=${APP_DEMO_SEED_CATEGORIES_ENABLED:true}
app.demo.seed.tickets-enabled=${APP_DEMO_SEED_TICKETS_ENABLED:true}
app.demo.seed.require-custom-passwords=${APP_DEMO_SEED_REQUIRE_CUSTOM_PASSWORDS:false}
app.demo.seed.user-password=${APP_DEMO_SEED_USER_PASSWORD:user123}
app.demo.seed.agent-password=${APP_DEMO_SEED_AGENT_PASSWORD:agent123}
app.demo.seed.admin-password=${APP_DEMO_SEED_ADMIN_PASSWORD:admin123}
