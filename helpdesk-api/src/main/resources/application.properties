spring.application.name=Helpdesk
spring.datasource.url=jdbc:h2:mem:helpdesk;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.attachments.storage-dir=uploads/attachments
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://macieserafin.pl
# Development/tests only. The browser app uses session cookies, not Basic Auth.
app.security.basic-auth-enabled=false
